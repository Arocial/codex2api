services:
  codex2api:
    build: .
    image: ghcr.io/arocial/codex2api:latest
    container_name: codex2api
    ports:
      - "127.0.0.1:3402:3402"
    environment:
      CODEX2API_API_KEY: "${CODEX2API_API_KEY:?set CODEX2API_API_KEY in the environment or .env file}"
    volumes:
      - codex-home:/root/.codex
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3402/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  codex-home:
